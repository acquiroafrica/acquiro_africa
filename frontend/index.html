<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acquiro | Buy and Sell Nigerian Businesses</title>
    <meta name="description" content="Acquiro helps Nigerian business owners find qualified buyers and helps buyers discover verified, cash-flowing SME opportunities." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" /></noscript>
    <style>
      :root{--teal:#07585f;--teal-2:#043f45;--teal-3:#e4f1f0;--gold:#f4a300;--gold-2:#d88d00;--ink:#102124;--muted:#647275;--paper:#f7f7f3;--card:#fff;--line:#dce4e2;--shadow:0 18px 50px rgba(7,88,95,.14)}
      *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}a{color:inherit;text-decoration:none}p{line-height:1.65}.nav{position:sticky;top:0;z-index:20;background:rgba(247,247,243,.94);backdrop-filter:blur(18px);border-bottom:1px solid rgba(7,88,95,.1)}.nav-inner{max-width:1180px;margin:auto;height:76px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center}.brand img{height:42px;width:auto;display:block}.nav-links{display:flex;gap:22px;color:var(--muted);font-size:14px;font-weight:700}.nav-actions{display:flex;gap:10px}.btn{border-radius:8px;padding:11px 16px;background:var(--teal);color:#fff;font-weight:800;display:inline-flex;align-items:center;justify-content:center;transition:.16s}.btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(7,88,95,.18)}.btn.gold{background:var(--gold);color:#1f1600}.btn.ghost{background:transparent;color:var(--teal);border:1px solid rgba(7,88,95,.22);box-shadow:none}.hero{background:#fff}.hero-inner{max-width:1180px;margin:auto;padding:72px 24px 42px;display:grid;grid-template-columns:minmax(0,1.02fr) minmax(360px,.88fr);gap:44px;align-items:center}.eyebrow{color:var(--gold-2);text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:900;margin:0 0 16px}.hero h1{font-size:clamp(42px,6vw,72px);line-height:1;letter-spacing:-.06em;margin:0;color:var(--teal-2)}.lead{max-width:660px;color:#536466;font-size:18px;margin:24px 0 30px}.hero-actions{display:flex;gap:12px;flex-wrap:wrap}.hero-visual{position:relative;min-height:520px;border-radius:22px;overflow:hidden;box-shadow:var(--shadow);background:var(--teal)}.hero-visual img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.hero-visual:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,63,69,.12),rgba(4,63,69,.72))}.hero-card{position:absolute;left:22px;right:22px;bottom:22px;z-index:1;background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:20px}.hero-card h2{font-size:20px;margin:0 0 12px;color:var(--teal-2)}.signal{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px 0;border-top:1px solid var(--line)}.signal:first-of-type{border-top:0}.signal span{color:var(--muted);font-size:13px}.signal b{text-align:right;color:var(--teal)}.trust-strip{max-width:1180px;margin:auto;padding:0 24px 38px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.trust-strip div{background:var(--teal);color:#fff;border-radius:14px;padding:17px}.trust-strip b{display:block;color:var(--gold);font-size:21px}.trust-strip span{font-size:12px;color:rgba(255,255,255,.74);font-weight:800;text-transform:uppercase;letter-spacing:.04em}.section{max-width:1180px;margin:auto;padding:72px 24px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:24px}.section h2{font-size:clamp(28px,4vw,46px);letter-spacing:-.045em;line-height:1.04;margin:0;color:var(--teal-2)}.sub{max-width:650px;color:var(--muted);margin:10px 0 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card,.deal,.table{background:var(--card);border:1px solid var(--line);border-radius:14px}.card{padding:22px}.card h3,.deal h3{font-size:20px;letter-spacing:-.03em;margin:12px 0 8px;color:var(--teal-2)}.card p,.deal p{color:var(--muted);margin:0}.icon{width:42px;height:42px;border-radius:12px;background:var(--teal-3);display:grid;place-items:center;color:var(--teal);font-weight:900}.tag{width:fit-content;background:#fff4d8;color:#8a5a00;border:1px solid #f0d28c;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.deal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.deal{overflow:hidden;display:grid}.deal:hover{border-color:var(--gold);box-shadow:var(--shadow)}.deal-img{height:150px;background:var(--teal-3);overflow:hidden}.deal-img img{width:100%;height:100%;object-fit:cover;display:block}.deal-body{padding:18px;display:grid;gap:13px}.deal-top{display:flex;justify-content:space-between;gap:10px}.verified{color:var(--teal);background:var(--teal-3);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900}.metrics{display:grid;grid-template-columns:repeat(3,1fr);background:#f3f7f6;border:1px solid var(--line);border-radius:10px;overflow:hidden}.metrics div{padding:11px 8px;text-align:center;border-right:1px solid var(--line)}.metrics div:last-child{border-right:0}.metrics b{display:block;color:var(--teal);font-size:14px}.metrics span{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800}.chips{display:flex;flex-wrap:wrap;gap:6px}.chips span{font-size:12px;background:#f3f7f6;border:1px solid var(--line);border-radius:7px;padding:4px 8px}.band{background:var(--teal-2);color:#fff}.band .section{padding-top:62px;padding-bottom:62px}.band h2{color:#fff}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;counter-reset:step}.step{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:20px;counter-increment:step}.step:before{content:counter(step);width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:#1f1600;font-weight:900;margin-bottom:14px}.step h3{margin:0 0 8px}.step p{margin:0;color:rgba(255,255,255,.72)}.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}.photo-card{position:relative;min-height:320px;overflow:hidden;border-radius:16px;box-shadow:var(--shadow)}.photo-card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.photo-card:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,63,69,.05),rgba(4,63,69,.7))}.photo-card div{position:absolute;left:22px;right:22px;bottom:22px;z-index:1;color:#fff}.table{overflow:hidden}.row{display:grid;grid-template-columns:1.7fr 1fr .9fr .9fr .9fr;gap:12px;padding:16px 18px;border-top:1px solid var(--line);align-items:center}.row:first-child{border-top:0;background:var(--teal-3);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:900;color:var(--teal)}.row span{color:var(--muted)}.cta{background:linear-gradient(135deg,var(--teal),var(--teal-2));color:#fff;border-radius:18px;padding:34px;display:flex;align-items:center;justify-content:space-between;gap:24px}.cta h2{font-size:34px;color:#fff}.cta p{color:rgba(255,255,255,.78)}.footer{padding:34px 24px;border-top:1px solid var(--line);color:var(--muted)}.footer-inner{max-width:1180px;margin:auto;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}.modal-backdrop{position:fixed;inset:0;background:rgba(4,63,69,.74);z-index:50;display:grid;place-items:center;padding:18px}.modal{width:min(620px,100%);background:#fff;border-radius:16px;padding:24px;position:relative;box-shadow:var(--shadow)}.modal h2{margin:0 0 6px;color:var(--teal-2)}.modal p{color:var(--muted);margin:0 0 16px}.close{position:absolute;right:16px;top:16px;width:32px;height:32px;border-radius:50%;background:var(--teal);color:#fff}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{display:grid;gap:6px;font-size:12px;font-weight:900;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}.form input,.form select,.form textarea{border:1px solid var(--line);border-radius:8px;padding:11px 12px}.form textarea,.form .full{grid-column:1/-1}.success{background:var(--teal-3);border:1px solid #b8d6d4;color:var(--teal);border-radius:12px;padding:14px;margin-top:12px}@media(max-width:900px){.nav-links{display:none}.hero-inner,.split{grid-template-columns:1fr}.hero-visual{min-height:420px}.trust-strip,.grid,.deal-grid,.steps{grid-template-columns:1fr 1fr}.section-head,.cta{display:block}.row{grid-template-columns:1fr}.row:first-child{display:none}}@media(max-width:620px){.nav-inner{height:auto;padding:14px 18px;align-items:flex-start;flex-wrap:wrap}.brand img{height:36px}.nav-actions{width:100%}.nav-actions .btn{flex:1}.hero-inner{padding-top:44px}.trust-strip,.grid,.deal-grid,.steps,.form{grid-template-columns:1fr}.hero-actions .btn{width:100%}}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const images={
        hero:"https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1200&q=80",
        seller:"https://images.unsplash.com/photo-1556745757-8d76bdb6984b?auto=format&fit=crop&w=900&q=80",
        buyer:"https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=900&q=80"
      };
      const listings=[
        {sector:"Food & Hospitality",state:"Lagos",lga:"Lekki",mrr:"₦20M-₦50M",years:"6 yrs",staff:"21-50",price:"₦320M",deal:"Full Sale",img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=900&q=80",desc:"Multi-location restaurant business with recurring corporate lunch demand, experienced staff, and documented operating history.",tags:["Confidential","Cash-flowing","NDA required"]},
        {sector:"Logistics",state:"Lagos",lga:"Ikeja",mrr:"₦10M-₦20M",years:"4 yrs",staff:"11-20",price:"₦120M",deal:"Partial Sale",img:"https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=900&q=80",desc:"Last-mile delivery operator with fleet assets, B2B contracts, and expansion opportunities across Lagos routes.",tags:["Asset-backed","B2B","Growth capital"]},
        {sector:"Healthcare",state:"Abuja",lga:"Garki",mrr:"₦10M-₦20M",years:"7 yrs",staff:"11-20",price:"₦210M",deal:"Full Sale",img:"https://images.unsplash.com/photo-1581093458791-9d15482442f6?auto=format&fit=crop&w=900&q=80",desc:"Diagnostic centre with lab, imaging, specialist consultation, accreditation, and retained patient demand.",tags:["Healthcare","Verified","Operator-ready"]},
        {sector:"Manufacturing",state:"Ogun",lga:"Sagamu",mrr:"₦20M-₦50M",years:"9 yrs",staff:"51-100",price:"₦410M",deal:"Full Sale",img:"https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=900&q=80",desc:"Food processing and packaging plant serving distributors across South-West Nigeria from an established facility.",tags:["Manufacturing","B2B","Asset-heavy"]},
        {sector:"Education",state:"Lagos",lga:"Yaba",mrr:"₦5M-₦10M",years:"5 yrs",staff:"1-10",price:"₦65M",deal:"Investment",img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80",desc:"Vocational training centre with corporate training contracts, graduate placement history, and room for expansion.",tags:["Education","Recurring revenue","Impact"]},
        {sector:"Professional Services",state:"Lagos",lga:"Ikoyi",mrr:"₦5M-₦10M",years:"6 yrs",staff:"11-20",price:"₦88M",deal:"Partnership",img:"https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=900&q=80",desc:"HR consulting and executive search firm with retainer-based revenue across financial services and FMCG clients.",tags:["Retainers","B2B","Partnership"]}
      ];
      const directory=[["Food & Hospitality Business","Food & Hospitality","Lagos","₦20M-₦50M","Verified"],["Healthcare Business","Healthcare","Abuja","₦10M-₦20M","Verified"],["Cold Chain Operator","Agribusiness","Rivers","₦5M-₦10M","In review"],["Packaging Plant","Manufacturing","Ogun","₦20M-₦50M","Verified"],["Training Institute","Education","Lagos","₦5M-₦10M","Verified"]];
      const app=document.getElementById("app");
      const state={modal:null,submitted:null};
      const open=(modal)=>{state.modal=modal;state.submitted=null;render()};
      const close=()=>{state.modal=null;state.submitted=null;render()};
      const submit=(event)=>{event.preventDefault();state.submitted="Thank you. Your request has been received. Our team will review it and follow up if there is a fit.";render()};
      function dealCard(l){return `<article class="deal"><div class="deal-img"><img src="${l.img}" alt="${l.sector} business"></div><div class="deal-body"><div class="deal-top"><span class="tag">${l.sector}</span><span class="verified">Reviewed</span></div><h3>${l.sector} Business</h3><p>${l.lga}, ${l.state} · ${l.deal}</p><div class="metrics"><div><b>${l.mrr}</b><span>Revenue</span></div><div><b>${l.years}</b><span>Operating</span></div><div><b>${l.staff}</b><span>Staff</span></div></div><p>${l.desc}</p><div class="chips">${l.tags.map(t=>`<span>${t}</span>`).join("")}</div><div style="display:flex;align-items:center;justify-content:space-between;gap:12px"><strong>${l.price}</strong><button class="btn ghost" data-modal="buyer">Request access</button></div></div></article>`}
      function modal(){if(!state.modal)return"";const copy={seller:["List Your Business Confidentially","Tell us about the business, the kind of transaction you are considering, and how soon you would like to explore options."],buyer:["Request Buyer Access","Tell us what kinds of businesses you want to acquire or invest in. Access to deeper information is reviewed before it is granted."],directory:["Register Your Business","Add your business to Acquiro so the right buyers or opportunities can be matched when relevant."]}[state.modal];return `<div class="modal-backdrop"><div class="modal"><button class="close" data-close>x</button><h2>${copy[0]}</h2><p>${copy[1]}</p><form class="form" data-form><label>Name<input required name="name" placeholder="Full name"></label><label>Email<input required type="email" name="email" placeholder="you@company.com"></label><label>Company<input name="org" placeholder="Business or buyer profile"></label><label>Location<select name="location"><option>Lagos</option><option>Abuja</option><option>Rivers</option><option>Ogun</option><option>Other</option></select></label><label class="full">I am interested in<select name="interest"><option>Selling my business</option><option>Buying a business</option><option>Investing in a business</option><option>Registering my business</option></select></label><label class="full">Brief note<textarea name="note" placeholder="Share sector, revenue band, budget, timeline, or what you are looking for."></textarea></label><button class="btn gold full">Submit request</button></form>${state.submitted?`<div class="success">${state.submitted}</div>`:""}</div></div>`}
      function render(){app.innerHTML=`<div class="shell"><nav class="nav"><div class="nav-inner"><a class="brand" href="#"><img src="assets/acquiro-logo-cropped.png" alt="Acquiro"></a><div class="nav-links"><a href="#sellers">For sellers</a><a href="#buyers">For buyers</a><a href="#deals">Opportunities</a><a href="#trust">How it works</a></div><div class="nav-actions"><button class="btn ghost" data-modal="buyer">Buyer access</button><button class="btn gold" data-modal="seller">List a business</button></div></div></nav><main><section class="hero"><div class="hero-inner"><div><p class="eyebrow">Buy and sell Nigerian businesses</p><h1>A confidential marketplace for serious SME buyers and sellers.</h1><p class="lead">Acquiro helps business owners explore exits, acquisitions, investments, and partnerships with qualified counterparties. Sellers stay protected. Buyers get cleaner, more structured deal flow.</p><div class="hero-actions"><button class="btn gold" data-modal="seller">List your business</button><button class="btn ghost" data-modal="buyer">Request buyer access</button></div></div><aside class="hero-visual"><img src="${images.hero}" alt="Business owners in a meeting"><div class="hero-card"><h2>Built for considered transactions.</h2><div class="signal"><span>For sellers</span><b>Confidential listings</b></div><div class="signal"><span>For buyers</span><b>Reviewed deal flow</b></div><div class="signal"><span>Access</span><b>NDA before details</b></div><div class="signal"><span>Support</span><b>Guided process</b></div></div></aside></div><div class="trust-strip"><div><b>Confidential</b><span>Seller identity protected</span></div><div><b>Reviewed</b><span>Profiles checked first</span></div><div><b>Structured</b><span>Clear transaction steps</span></div><div><b>Local</b><span>Built for Nigerian SMEs</span></div></div></section><section class="section" id="sellers"><div class="section-head"><div><h2>For business owners thinking about what comes next.</h2><p class="sub">Whether you want a full sale, partial sale, investment partner, merger, or succession option, Acquiro helps you present your business without immediately exposing sensitive information.</p></div><button class="btn gold" data-modal="seller">Start seller request</button></div><div class="grid"><article class="card"><div class="icon">01</div><span class="tag">Protect identity</span><h3>Stay confidential while interest is tested</h3><p>Your business can be shown by sector, location, revenue range, and deal type before your name or deeper details are shared.</p></article><article class="card"><div class="icon">02</div><span class="tag">Show value</span><h3>Present the business professionally</h3><p>Structured profiles help buyers understand revenue, operations, staff, assets, customer base, and reason for transaction.</p></article><article class="card"><div class="icon">03</div><span class="tag">Choose pace</span><h3>Control the next step</h3><p>Interest does not mean disclosure. Deeper conversations happen only after review, fit, and NDA.</p></article></div></section><section class="section" id="buyers"><div class="section-head"><div><h2>For buyers looking beyond starting from zero.</h2><p class="sub">Find operating businesses with customers, revenue history, teams, assets, and owners who are open to a structured conversation.</p></div><button class="btn ghost" data-modal="buyer">Request buyer access</button></div><div class="split"><div class="photo-card"><img src="${images.buyer}" alt="Buyer reviewing business opportunity"><div><h3>Reviewed opportunities</h3><p>Move from broad interest to qualified shortlists with cleaner business signals.</p></div></div><div class="grid" style="grid-template-columns:1fr"><article class="card"><span class="tag">Discover</span><h3>Browse by sector, location, and deal type</h3><p>Start with anonymised opportunities and request access when there is a serious fit.</p></article><article class="card"><span class="tag">Compare</span><h3>Review key business signals quickly</h3><p>Revenue band, operating history, staff range, asking price, and transaction type help you shortlist efficiently.</p></article></div></div></section><section class="section" id="deals"><div class="section-head"><div><h2>Sample opportunity view.</h2><p class="sub">Public opportunities are intentionally limited. Deeper financials, documents, and seller identity are only shared after review and NDA.</p></div></div><div class="deal-grid">${listings.map(dealCard).join("")}</div></section><section class="band" id="trust"><div class="section"><div class="section-head"><div><h2>How the process works.</h2><p class="sub" style="color:rgba(255,255,255,.72)">Acquiro is designed for trust-heavy transactions where both sides need enough information to assess fit without exposing too much too early.</p></div></div><div class="steps"><article class="step"><h3>Submit request</h3><p>Sellers submit a business profile. Buyers submit acquisition or investment criteria.</p></article><article class="step"><h3>Review fit</h3><p>Acquiro reviews the request and determines whether there is enough information to proceed.</p></article><article class="step"><h3>Share safely</h3><p>Business identity and deeper financials remain protected until the right access step.</p></article><article class="step"><h3>Open conversation</h3><p>Qualified buyer and seller conversations move forward through a structured path.</p></article></div></div></section><section class="section" id="directory"><div class="section-head"><div><h2>Business directory.</h2><p class="sub">Businesses can register interest even before they are ready for a sale. This helps Acquiro match relevant buyers and future opportunities when there is fit.</p></div><button class="btn gold" data-modal="directory">Register business</button></div><div class="table"><div class="row"><strong>Business</strong><strong>Sector</strong><strong>State</strong><strong>Revenue band</strong><strong>Status</strong></div>${directory.map(r=>`<div class="row"><strong>${r[0]}</strong><span>${r[1]}</span><span>${r[2]}</span><span>${r[3]}</span><span>${r[4]}</span></div>`).join("")}</div></section><section class="section"><div class="cta"><div><h2>What you built is worth something.</h2><p>Acquiro helps the right buyer and seller find each other with more structure, discretion, and confidence.</p></div><button class="btn gold" data-modal="seller">Start with Acquiro</button></div></section></main><footer class="footer"><div class="footer-inner"><strong>Acquiro</strong><span>Confidential business sales, acquisitions, and investment conversations for Nigerian SMEs.</span></div></footer></div>${modal()}`;document.querySelectorAll("[data-modal]").forEach(b=>b.onclick=()=>open(b.dataset.modal));document.querySelectorAll("[data-close]").forEach(b=>b.onclick=close);document.querySelector("[data-form]")?.addEventListener("submit",submit)}
      render();
    </script>
  </body>
</html>
